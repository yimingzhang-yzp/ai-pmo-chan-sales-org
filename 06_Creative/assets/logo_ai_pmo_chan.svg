<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" role="img" aria-label="AI PMOちゃん ロゴ">
  <defs>
    <!-- Primary gradient: pink → purple -->
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff85a1"/>
      <stop offset="100%" stop-color="#b57bee"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="grad-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff85a1"/>
      <stop offset="100%" stop-color="#b57bee"/>
    </linearGradient>
    <!-- Subtle shadow for face -->
    <filter id="face-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#b57bee" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ============================
       ICON MARK (160 × 160)
       ============================ -->

  <!-- Background rounded square -->
  <rect x="4" y="24" width="152" height="130" rx="34" fill="url(#grad-main)"/>

  <!-- Left ear outer -->
  <polygon points="20,52 44,6 68,52" fill="url(#grad-main)"/>
  <!-- Left ear inner (highlight) -->
  <polygon points="27,50 44,18 61,50" fill="#ffb8d0" opacity="0.55"/>

  <!-- Right ear outer -->
  <polygon points="92,52 116,6 140,52" fill="url(#grad-main)"/>
  <!-- Right ear inner (highlight) -->
  <polygon points="99,50 116,18 133,50" fill="#ffb8d0" opacity="0.55"/>

  <!-- Face circle (white) -->
  <circle cx="80" cy="96" r="52" fill="#ffffff" filter="url(#face-shadow)"/>

  <!-- ── Left eye ── -->
  <circle cx="62" cy="86" r="12" fill="#ffffff"/>
  <circle cx="62" cy="87" r="9" fill="#7c4dce"/>
  <circle cx="62" cy="88" r="6" fill="#2d2640"/>
  <circle cx="66" cy="83" r="3" fill="#ffffff"/>
  <circle cx="59" cy="90" r="1.5" fill="#ffffff" opacity="0.7"/>

  <!-- ── Right eye ── -->
  <circle cx="98" cy="86" r="12" fill="#ffffff"/>
  <circle cx="98" cy="87" r="9" fill="#7c4dce"/>
  <circle cx="98" cy="88" r="6" fill="#2d2640"/>
  <circle cx="102" cy="83" r="3" fill="#ffffff"/>
  <circle cx="95" cy="90" r="1.5" fill="#ffffff" opacity="0.7"/>

  <!-- ── Nose ── -->
  <path d="M77,101 L80,96 L83,101 Q80,105 77,101Z" fill="#ff85a1"/>

  <!-- ── Mouth (cat W smile) ── -->
  <path d="M73,108 Q77,114 80,111 Q83,114 87,108" stroke="#c95080" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- ── Cheeks ── -->
  <ellipse cx="51" cy="103" rx="10" ry="6.5" fill="#ff85a1" opacity="0.22"/>
  <ellipse cx="109" cy="103" rx="10" ry="6.5" fill="#ff85a1" opacity="0.22"/>

  <!-- ── Whiskers left ── -->
  <line x1="28" y1="99"  x2="62" y2="102" stroke="#c4b8d8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28" y1="105" x2="62" y2="105" stroke="#c4b8d8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28" y1="111" x2="63" y2="109" stroke="#c4b8d8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ── Whiskers right ── -->
  <line x1="132" y1="99"  x2="98" y2="102" stroke="#c4b8d8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="132" y1="105" x2="98" y2="105" stroke="#c4b8d8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="132" y1="111" x2="97" y2="109" stroke="#c4b8d8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ── Sparkles ── -->
  <!-- Top right sparkle (4-pointed star) -->
  <path d="M140,18 L142.5,12 L145,18 L151,20.5 L145,23 L142.5,29 L140,23 L134,20.5Z" fill="#ffd86e"/>
  <!-- Small sparkle top left -->
  <path d="M14,28 L15.5,24 L17,28 L21,29.5 L17,31 L15.5,35 L14,31 L10,29.5Z" fill="#ffffff" opacity="0.75"/>

  <!-- ============================
       WORDMARK
       ============================ -->

  <!-- "AI PMOちゃん" main text -->
  <text
    x="184" y="82"
    font-family="'Hiragino Maru Gothic ProN','Hiragino Maru Gothic Pro','M PLUS Rounded 1c','Noto Sans JP',sans-serif"
    font-size="46"
    font-weight="900"
    letter-spacing="-0.5"
    fill="url(#grad-text)"
  >AI PMOちゃん</text>

  <!-- Divider line -->
  <line x1="184" y1="96" x2="474" y2="96" stroke="#ede8f6" stroke-width="1.5"/>

  <!-- Tagline -->
  <text
    x="186" y="118"
    font-family="'Hiragino Maru Gothic ProN','Hiragino Maru Gothic Pro','M PLUS Rounded 1c','Noto Sans JP',sans-serif"
    font-size="15"
    font-weight="600"
    letter-spacing="1.5"
    fill="#9e92b0"
  >AI PMO ASSISTANT</text>

  <!-- Tagline Japanese -->
  <text
    x="186" y="142"
    font-family="'Hiragino Maru Gothic ProN','Hiragino Maru Gothic Pro','M PLUS Rounded 1c','Noto Sans JP',sans-serif"
    font-size="12.5"
    font-weight="500"
    fill="#b0a5c4"
  >話しかけるだけで、PMO業務が片付く。</text>
</svg>
